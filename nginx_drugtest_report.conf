# Nginx Reverse Proxy Configuration for drugtest.report
# Place this file in /etc/nginx/sites-available/drugtest.report and symlink to sites-enabled
# Remember to adjust client_max_body_size to allow your 30MB product thumbnail uploads!

server {
    listen 80;
    listen [::]:80;

    # Your actual domain and www subdomain
    server_name drugtest.report www.drugtest.report;

    # Maximum file upload size through Nginx (Must match or exceed Multer's 30MB limit)
    client_max_body_size 35M;

    # Log file locations
    access_log /var/log/nginx/drugtest_report_access.log;
    error_log /var/log/nginx/drugtest_report_error.log;

    # Static uploads caching headers (Optional but optimized)
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Reverse Proxy all traffic to the Node.js Express server running on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        
        # Critical headers for Express body-parsing, JWT session cookies, and IP routing
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable proxy buffering for immediate responsive transfer streams
        proxy_cache_bypass $http_upgrade;
    }
}
